<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NileCart v13 Super Platform</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f5fb;
}

header{
background:#0A4DA3;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#F9A825;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

.tab{
background:#00AEEF;
color:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

#map{
height:320px;
background:#e8f1ff;
border-radius:10px;
position:relative;
}

.dot{
width:14px;
height:14px;
background:red;
border-radius:50%;
position:absolute;
}

.seat{
display:inline-block;
border:1px solid #999;
padding:8px;
margin:4px;
cursor:pointer;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<header>
<div>NileCart</div>
<div id="user"></div>
</header>

<div class="container">
<div id="app"></div>
</div>

<div id="cartBox" class="cart"></div>

<script>

/* ---------------- DATABASE ---------------- */

function seed(){

if(!localStorage.users){

localStorage.users = JSON.stringify([
{email:"admin@nilecart.com",password:"1234",role:"admin"},
{email:"vendor@nilecart.com",password:"1234",role:"vendor"},
{email:"restaurant@nilecart.com",password:"1234",role:"restaurant"},
{email:"bus@nilecart.com",password:"1234",role:"bus"},
{email:"rider@nilecart.com",password:"1234",role:"rider"},
{email:"user@nilecart.com",password:"1234",role:"customer"}
])

}

if(!localStorage.products){

localStorage.products = JSON.stringify([
{name:"Samsung Phone",price:300,vendor:"Juba Electronics"},
{name:"Power Bank",price:25,vendor:"Juba Electronics"},
{name:"Laptop Bag",price:40,vendor:"Nile Tech"}
])

}

if(!localStorage.menu){

localStorage.menu = JSON.stringify([
{name:"Burger",price:5,restaurant:"Nile Grill"},
{name:"Pizza",price:8,restaurant:"Nile Grill"},
{name:"Chicken Meal",price:7,restaurant:"Juba Kitchen"}
])

}

if(!localStorage.trips){

localStorage.trips = JSON.stringify([
{route:"Juba → Kampala",price:45,seats:32},
{route:"Juba → Nimule",price:12,seats:30}
])

}

if(!localStorage.cart) localStorage.cart="[]"
if(!localStorage.orders) localStorage.orders="[]"
if(!localStorage.shipments) localStorage.shipments="[]"
if(!localStorage.notifications) localStorage.notifications="[]"

}

seed()

/* ---------------- LOGIN ---------------- */

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

let users=JSON.parse(localStorage.users)

let u=users.find(x=>x.email==email && x.password==pass)

if(!u) return alert("Login failed")

localStorage.session=JSON.stringify(u)

location.reload()

}

function logout(){

localStorage.removeItem("session")
location.reload()

}

/* ---------------- CART ---------------- */

function addCart(name,price){

let cart=JSON.parse(localStorage.cart)

cart.push({name,price})

localStorage.cart=JSON.stringify(cart)

drawCart()

}

function drawCart(){

let cart=JSON.parse(localStorage.cart)

let total=0

let html="<b>Cart</b><br>"

cart.forEach((c,i)=>{

html+=c.name+" $"+c.price+"<br>"

total+=Number(c.price)

})

html+="<br>Total: $"+total
html+="<br><button onclick='checkout()'>Checkout</button>"

document.getElementById("cartBox").innerHTML=html

}

function checkout(){

let cart=JSON.parse(localStorage.cart)
let orders=JSON.parse(localStorage.orders)

cart.forEach(c=>orders.push({item:c.name,status:"Pending"}))

localStorage.orders=JSON.stringify(orders)
localStorage.cart="[]"

alert("Order placed")

drawCart()

}

/* ---------------- MARKETPLACE ---------------- */

function marketplace(){

let products=JSON.parse(localStorage.products)
let menu=JSON.parse(localStorage.menu)
let trips=JSON.parse(localStorage.trips)

let html=`
<h2>Marketplace</h2>

<div class="tabs">
<div class="tab" onclick="shop()">Vendors</div>
<div class="tab" onclick="food()">Restaurants</div>
<div class="tab" onclick="buses()">Bus Tickets</div>
<div class="tab" onclick="ship()">Shipping</div>
</div>

<div id="market"></div>
`

app.innerHTML=html

shop()

}

function shop(){

let products=JSON.parse(localStorage.products)

let html='<div class="grid">'

products.forEach(p=>{

html+=`
<div class="card">
<b>${p.name}</b>
<p>$${p.price}</p>
<button onclick="addCart('${p.name}',${p.price})">Add Cart</button>
</div>
`

})

html+="</div>"

market.innerHTML=html

}

function food(){

let menu=JSON.parse(localStorage.menu)

let html='<div class="grid">'

menu.forEach(m=>{

html+=`
<div class="card">
<b>${m.name}</b>
<p>$${m.price}</p>
<button onclick="addCart('${m.name}',${m.price})">Order</button>
</div>
`

})

html+="</div>"

market.innerHTML=html

}

/* ---------------- BUS ---------------- */

function buses(){

let trips=JSON.parse(localStorage.trips)

let html=""

trips.forEach((t,i)=>{

html+=`
<div class="card">
<b>${t.route}</b>
<p>$${t.price}</p>
<button onclick="seatUI(${i})">Select Seat</button>
</div>
`

})

market.innerHTML=html

}

function seatUI(i){

let html="<h3>Select Seat</h3>"

for(let s=1;s<=12;s++){

html+=`<div class="seat" onclick="bookSeat(${s})">${s}</div>`

}

market.innerHTML=html

}

function bookSeat(s){

alert("Seat "+s+" booked")

}

/* ---------------- SHIPPING ---------------- */

function ship(){

market.innerHTML=`
<h3>Create Shipment</h3>

<input id="sender" placeholder="Sender">
<input id="receiver" placeholder="Receiver">

<button onclick="createShipment()">Create</button>

`
}

function trackNum(){

return "NC-TRK-"+Math.floor(Math.random()*99999)

}

function createShipment(){

let shipments=JSON.parse(localStorage.shipments)

shipments.push({
tracking:trackNum(),
status:"Pending",
route:"Juba → Kampala"
})

localStorage.shipments=JSON.stringify(shipments)

alert("Shipment created")

}

/* ---------------- RIDER ---------------- */

function rider(){

let orders=JSON.parse(localStorage.orders)

let html="<h2>Deliveries</h2>"

orders.forEach((o,i)=>{

html+=`
<div class="card">
${o.item} - ${o.status}
<button onclick="deliver(${i})">Delivered</button>
</div>
`

})

app.innerHTML=html

}

function deliver(i){

let orders=JSON.parse(localStorage.orders)

orders[i].status="Delivered"

localStorage.orders=JSON.stringify(orders)

render()

}

/* ---------------- ADMIN ---------------- */

function admin(){

let orders=JSON.parse(localStorage.orders)

app.innerHTML=`

<h2>Admin Dashboard</h2>

<canvas id="chart"></canvas>

<h3>Logistics Map</h3>

<div id="map">
<div class="dot" style="top:40%;left:20%" title="Juba"></div>
<div class="dot" style="top:35%;left:40%" title="Nimule"></div>
<div class="dot" style="top:32%;left:60%" title="Gulu"></div>
<div class="dot" style="top:30%;left:75%" title="Kampala"></div>
</div>

`

let ctx=document.getElementById("chart")

new Chart(ctx,{
type:"bar",
data:{
labels:["Orders"],
datasets:[{
label:"Total",
data:[orders.length]
}]
}
})

}

/* ---------------- ROUTER ---------------- */

function render(){

let session=JSON.parse(localStorage.session||"null")

if(!session){

app.innerHTML=`
<h2>Login</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Login</button>

<p>
admin@nilecart.com / 1234<br>
user@nilecart.com / 1234
</p>
`

return

}

user.innerHTML=session.role+" <button onclick='logout()'>Logout</button>"

if(session.role=="customer") marketplace()
if(session.role=="rider") rider()
if(session.role=="admin") admin()

drawCart()

}

render()

</script>

</body>
</html>
