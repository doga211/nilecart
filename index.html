<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>NileCart v14 Super Platform</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

header{
background:#0A4DA3;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

button{
background:#F9A825;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab{
background:#00AEEF;
color:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

#map{
height:300px;
background:#e8f1ff;
border-radius:10px;
position:relative;
overflow:hidden;
}

.dot{
width:14px;
height:14px;
background:red;
border-radius:50%;
position:absolute;
}

.timeline{
border-left:3px solid #0A4DA3;
padding-left:10px;
}

.step{
margin:10px 0;
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
}

@media(min-width:900px){
.bottomnav{
display:none;
}
}

</style>

</head>

<body>

<header>
<div><b>NileCart</b></div>
<div id="user"></div>
</header>

<div class="container">

<div id="app"></div>

</div>

<div id="cart"></div>

<div class="bottomnav">
<div onclick="marketplace()">Home</div>
<div onclick="orders()">Orders</div>
<div onclick="tracking()">Track</div>
<div onclick="profile()">Profile</div>
</div>

<script>

/* DATABASE */

function seed(){

if(!localStorage.users){

localStorage.users = JSON.stringify([
{email:"admin@nilecart.com",password:"1234",role:"admin"},
{email:"vendor@nilecart.com",password:"1234",role:"vendor"},
{email:"restaurant@nilecart.com",password:"1234",role:"restaurant"},
{email:"bus@nilecart.com",password:"1234",role:"bus"},
{email:"rider@nilecart.com",password:"1234",role:"rider"},
{email:"user@nilecart.com",password:"1234",role:"customer"}
])

}

if(!localStorage.vendors){

localStorage.vendors = JSON.stringify([
{id:1,name:"Juba Electronics",rating:4.6},
{id:2,name:"Nile Fashion",rating:4.2}
])

}

if(!localStorage.products){

localStorage.products = JSON.stringify([
{name:"Samsung Phone",price:300,vendor:1},
{name:"Power Bank",price:20,vendor:1},
{name:"T-Shirt",price:12,vendor:2}
])

}

if(!localStorage.restaurants){

localStorage.restaurants = JSON.stringify([
{id:1,name:"Nile Grill"},
{id:2,name:"Juba Kitchen"}
])

}

if(!localStorage.menu){

localStorage.menu = JSON.stringify([
{name:"Burger",price:5,restaurant:1},
{name:"Pizza",price:8,restaurant:1},
{name:"Chicken Meal",price:7,restaurant:2}
])

}

if(!localStorage.trips){

localStorage.trips = JSON.stringify([
{route:"Juba → Kampala",price:45},
{route:"Juba → Nimule",price:12}
])

}

if(!localStorage.orders) localStorage.orders="[]"
if(!localStorage.shipments) localStorage.shipments="[]"
if(!localStorage.cart) localStorage.cart="[]"
if(!localStorage.notifications) localStorage.notifications="[]"

}

seed()

/* LOGIN */

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

let users=JSON.parse(localStorage.users)

let u=users.find(x=>x.email==email && x.password==pass)

if(!u) return alert("Login failed")

localStorage.session=JSON.stringify(u)

location.reload()

}

function logout(){

localStorage.removeItem("session")
location.reload()

}

/* NOTIFICATIONS */

function notify(text){

let n=JSON.parse(localStorage.notifications)

n.push(text)

localStorage.notifications=JSON.stringify(n)

}

/* MARKETPLACE */

function marketplace(){

let vendors=JSON.parse(localStorage.vendors)
let restaurants=JSON.parse(localStorage.restaurants)
let trips=JSON.parse(localStorage.trips)

let html = `
<h2>Marketplace</h2>

<div class="tabs">

<div class="tab" onclick="vendorsPage()">Vendors</div>
<div class="tab" onclick="restaurantsPage()">Restaurants</div>
<div class="tab" onclick="busPage()">Bus Tickets</div>
<div class="tab" onclick="shipping()">Shipping</div>

</div>

<div id="market"></div>
`

app.innerHTML=html

vendorsPage()

}

/* VENDORS */

function vendorsPage(){

let vendors=JSON.parse(localStorage.vendors)

let html='<div class="grid">'

vendors.forEach(v=>{

html+=`
<div class="card">
<h3>${v.name}</h3>
<p>⭐ ${v.rating}</p>
<button onclick="vendorStore(${v.id})">Open Store</button>
</div>
`

})

html+="</div>"

market.innerHTML=html

}

function vendorStore(id){

let products=JSON.parse(localStorage.products)

let html="<h3>Store</h3><div class='grid'>"

products.filter(p=>p.vendor==id).forEach(p=>{

html+=`
<div class="card">

<b>${p.name}</b>
<p>$${p.price}</p>

<button onclick="addCart('${p.name}',${p.price})">
Add Cart
</button>

</div>
`

})

html+="</div>"

market.innerHTML=html

}

/* RESTAURANTS */

function restaurantsPage(){

let r=JSON.parse(localStorage.restaurants)

let html='<div class="grid">'

r.forEach(x=>{

html+=`
<div class="card">
<h3>${x.name}</h3>
<button onclick="restaurantPage(${x.id})">
View Menu
</button>
</div>
`

})

html+="</div>"

market.innerHTML=html

}

function restaurantPage(id){

let menu=JSON.parse(localStorage.menu)

let html="<h3>Menu</h3><div class='grid'>"

menu.filter(m=>m.restaurant==id).forEach(m=>{

html+=`
<div class="card">
<b>${m.name}</b>
<p>$${m.price}</p>
<button onclick="addCart('${m.name}',${m.price})">
Order
</button>
</div>
`

})

html+="</div>"

market.innerHTML=html

}

/* BUS */

function busPage(){

let trips=JSON.parse(localStorage.trips)

let html=""

trips.forEach((t,i)=>{

html+=`
<div class="card">

<h3>${t.route}</h3>
<p>$${t.price}</p>

<button onclick="seatSelect()">
Select Seat
</button>

</div>
`

})

market.innerHTML=html

}

function seatSelect(){

let html="<h3>Select Seat</h3>"

for(let i=1;i<=16;i++){

html+=`<button onclick="alert('Seat booked')">${i}</button> `

}

market.innerHTML=html

}

/* SHIPPING */

function shipping(){

market.innerHTML=`

<h3>Create Shipment</h3>

<input id="sender" placeholder="Sender">
<input id="receiver" placeholder="Receiver">

<button onclick="createShipment()">
Create Shipment
</button>

`

}

function trackNum(){

return "NC-"+Math.floor(Math.random()*99999)

}

function createShipment(){

let s=JSON.parse(localStorage.shipments)

let track=trackNum()

s.push({
track:track,
status:"Created"
})

localStorage.shipments=JSON.stringify(s)

notify("Shipment "+track+" created")

alert("Shipment created "+track)

}

/* TRACKING */

function tracking(){

let s=JSON.parse(localStorage.shipments)

let html="<h2>Tracking</h2>"

s.forEach(x=>{

html+=`
<div class="card">

<b>${x.track}</b>

<div class="timeline">

<div class="step">✔ Created</div>
<div class="step">✔ Picked Up</div>
<div class="step">⬜ Border</div>
<div class="step">⬜ Kampala</div>
<div class="step">⬜ Delivered</div>

</div>

</div>
`

})

app.innerHTML=html

}

/* CART */

function addCart(name,price){

let c=JSON.parse(localStorage.cart)

c.push({name,price})

localStorage.cart=JSON.stringify(c)

drawCart()

}

function drawCart(){

let c=JSON.parse(localStorage.cart)

let html="<b>Cart</b><br>"

let total=0

c.forEach(i=>{
html+=i.name+" $"+i.price+"<br>"
total+=i.price
})

html+="<br>Total $"+total
html+="<br><button onclick='checkout()'>Checkout</button>"

cart.innerHTML=html

}

function checkout(){

let c=JSON.parse(localStorage.cart)
let o=JSON.parse(localStorage.orders)

c.forEach(i=>o.push({item:i.name,status:"New"}))

localStorage.orders=JSON.stringify(o)

localStorage.cart="[]"

notify("New order placed")

drawCart()

}

/* ADMIN */

function admin(){

let orders=JSON.parse(localStorage.orders)

app.innerHTML=`

<h2>Admin Dashboard</h2>

<canvas id="chart"></canvas>

<h3>Logistics Map</h3>

<div id="map">

<div class="dot" style="top:40%;left:15%"></div>
<div class="dot" style="top:35%;left:35%"></div>
<div class="dot" style="top:33%;left:55%"></div>
<div class="dot" style="top:30%;left:75%"></div>

</div>

`

let ctx=document.getElementById("chart")

new Chart(ctx,{
type:"bar",
data:{
labels:["Orders"],
datasets:[{label:"Orders",data:[orders.length]}]
}
})

}

/* ROUTER */

function render(){

let s=JSON.parse(localStorage.session||"null")

if(!s){

app.innerHTML=`

<h2>Login</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Login</button>

`

return

}

user.innerHTML=s.role+" <button onclick='logout()'>Logout</button>"

if(s.role=="customer") marketplace()
if(s.role=="admin") admin()

drawCart()

}

render()

</script>

</body>
</html>
