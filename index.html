<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NileCart Super Prototype v4</title>
<style>
body{font-family:Arial;margin:0;background:#f2f4f7;}
header{background:#0A4DA3;color:white;padding:15px;font-size:20px;}
nav{background:#00AEEF;padding:10px;}
nav button{margin:5px;padding:8px 12px;border:none;background:white;cursor:pointer;}
.container{padding:20px;}
.card{background:white;padding:15px;margin-bottom:10px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
input,select{padding:8px;margin:5px;width:200px;}
button.action{background:#F9A825;border:none;padding:8px 12px;cursor:pointer;}
.seat{display:inline-block;width:25px;height:25px;margin:2px;text-align:center;line-height:25px;border:1px solid #333;cursor:pointer;}
.seat.selected{background:#0A4DA3;color:white;}
.seat.occupied{background:#aaa;color:white;cursor:not-allowed;}
canvas{border:1px solid #333;background:#d0f4ff;}
</style>
</head>
<body>

<header>NileCart Super Prototype v4</header>
<nav id="nav"></nav>
<div class="container" id="app"></div>

<script>
/* ------------------ INIT LOCALSTORAGE ------------------ */
function initDB(){
if(!localStorage.users){
let users=[
{id:1,name:"Admin",email:"admin@nilecart.com",password:"1234",role:"admin"},
{id:2,name:"Vendor",email:"vendor@nilecart.com",password:"1234",role:"vendor"},
{id:3,name:"Restaurant",email:"food@nilecart.com",password:"1234",role:"restaurant"},
{id:4,name:"Bus Operator",email:"bus@nilecart.com",password:"1234",role:"bus"},
{id:5,name:"Rider",email:"rider@nilecart.com",password:"1234",role:"rider"},
{id:6,name:"Customer",email:"customer@nilecart.com",password:"1234",role:"customer"}
];
localStorage.users=JSON.stringify(users);
}
if(!localStorage.products) localStorage.products="[]";
if(!localStorage.menu) localStorage.menu="[]";
if(!localStorage.trips) localStorage.trips="[]";
if(!localStorage.orders) localStorage.orders="[]";
if(!localStorage.shipments) localStorage.shipments="[]";
}
initDB();

/* ------------------ AUTH ------------------ */
function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;
let users=JSON.parse(localStorage.users);
let user=users.find(u=>u.email==email && u.password==pass);
if(!user){alert("Login failed");return;}
localStorage.session=JSON.stringify(user);
loadDashboard();
}
function logout(){localStorage.removeItem("session");renderLogin();}

/* ------------------ NAV ------------------ */
function renderNav(){
let user=JSON.parse(localStorage.session);let nav=document.getElementById("nav");
nav.innerHTML="";
nav.innerHTML+=`<button onclick="loadDashboard()">Home</button>`;
nav.innerHTML+=`<button onclick="showMarketplace()">Marketplace</button>`;
nav.innerHTML+=`<button onclick="showFood()">Food</button>`;
nav.innerHTML+=`<button onclick="showBus()">Bus</button>`;
nav.innerHTML+=`<button onclick="showShipping()">Shipping</button>`;
if(user.role=="vendor") nav.innerHTML+=`<button onclick="vendorDashboard()">Vendor</button>`;
if(user.role=="restaurant") nav.innerHTML+=`<button onclick="restaurantDashboard()">Restaurant</button>`;
if(user.role=="bus") nav.innerHTML+=`<button onclick="busDashboard()">Bus Operator</button>`;
if(user.role=="rider") nav.innerHTML+=`<button onclick="riderDashboard()">Rider</button>`;
if(user.role=="admin") nav.innerHTML+=`<button onclick="adminDashboard()">Admin</button>`;
nav.innerHTML+=`<button onclick="showLogisticsMap()">Logistics Map</button>`;
nav.innerHTML+=`<button onclick="logout()">Logout</button>`;
}

/* ------------------ LOGIN ------------------ */
function renderLogin(){
document.getElementById("nav").innerHTML="";
document.getElementById("app").innerHTML=`
<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button class="action" onclick="login()">Login</button>
<p>Demo Accounts:</p>
admin@nilecart.com / 1234<br>
vendor@nilecart.com / 1234<br>
food@nilecart.com / 1234<br>
bus@nilecart.com / 1234<br>
rider@nilecart.com / 1234<br>
customer@nilecart.com / 1234
</div>
`
}

/* ------------------ DASHBOARD ------------------ */
function loadDashboard(){
renderNav();
let user=JSON.parse(localStorage.session);
document.getElementById("app").innerHTML=`<div class="card"><h2>Welcome ${user.name}</h2>Role: ${user.role}</div>`;
}

/* ------------------ MARKETPLACE ------------------ */
function showMarketplace(){
let products=JSON.parse(localStorage.products);
let html="<h2>Marketplace</h2>";
products.forEach(p=>{
html+=`<div class="card">${p.name}<br>Price $${p.price}<br><button class="action" onclick="buyProduct('${p.name}',${p.price})">Buy</button></div>`;
});
document.getElementById("app").innerHTML=html;
}
function buyProduct(name,price){
let orders=JSON.parse(localStorage.orders);
orders.push({type:"product",name:name,price:price,status:"pending"});
localStorage.orders=JSON.stringify(orders);
alert("Order placed");
}

/* ------------------ VENDOR ------------------ */
function vendorDashboard(){
let html=`<h2>Vendor Dashboard</h2>
<div class="card">
<input id="pname" placeholder="Product name">
<input id="pprice" placeholder="Price">
<button class="action" onclick="addProduct()">Add Product</button>
</div>
<h3>Orders</h3>`;
let orders=JSON.parse(localStorage.orders).filter(o=>o.type=="product");
orders.forEach((o,i)=>{html+=`<div class="card">${o.name} - $${o.price} - ${o.status} <button onclick="updateOrderStatus(${i},'completed')">Complete</button></div>`;});
document.getElementById("app").innerHTML=html;
}
function addProduct(){let name=document.getElementById("pname").value;let price=document.getElementById("pprice").value;let products=JSON.parse(localStorage.products);products.push({name:name,price:price});localStorage.products=JSON.stringify(products);alert("Product added");}
function updateOrderStatus(i,status){let orders=JSON.parse(localStorage.orders);orders[i].status=status;localStorage.orders=JSON.stringify(orders);alert("Order updated");vendorDashboard();}

/* ------------------ RESTAURANT ------------------ */
function showFood(){
let menu=JSON.parse(localStorage.menu);
let html="<h2>Food Menu</h2>";
menu.forEach(m=>{
html+=`<div class="card">${m.name} - $${m.price} <button class="action" onclick="orderFood('${m.name}',${m.price})">Order</button></div>`;
});
document.getElementById("app").innerHTML=html;
}
function restaurantDashboard(){
let html=`<h2>Restaurant Dashboard</h2>
<div class="card">
<input id="foodname" placeholder="Food name">
<input id="foodprice" placeholder="Price">
<button class="action" onclick="addFood()">Add Menu Item</button>
</div>
<h3>Orders</h3>`;
let orders=JSON.parse(localStorage.orders).filter(o=>o.type=="food");
orders.forEach((o,i)=>{html+=`<div class="card">${o.name} - ${o.status} <button onclick="updateFoodOrder(${i},'ready')">Ready</button> <button onclick="updateFoodOrder(${i},'delivered')">Delivered</button></div>`;});
document.getElementById("app").innerHTML=html;
}
function addFood(){let name=document.getElementById("foodname").value;let price=document.getElementById("foodprice").value;let menu=JSON.parse(localStorage.menu);menu.push({name:name,price:price});localStorage.menu=JSON.stringify(menu);alert("Menu item added");}
function orderFood(name,price){let orders=JSON.parse(localStorage.orders);orders.push({type:"food",name:name,price:price,status:"preparing"});localStorage.orders=JSON.stringify(orders);alert("Food ordered");}
function updateFoodOrder(i,status){let orders=JSON.parse(localStorage.orders);orders[i].status=status;localStorage.orders=JSON.stringify(orders);restaurantDashboard();}

/* ------------------ BUS ------------------ */
function showBus(){
let trips=JSON.parse(localStorage.trips);let html="<h2>Bus Trips</h2>";
trips.forEach((t,index)=>{
html+=`<div class="card">${t.route} - $${t.price} <br>Seats:<br>`;
for(let r=0;r<5;r++){for(let c=0;c<4;c++){let seatIndex=r*4+c;let occupied=t.seats&&t.seats.includes(seatIndex)?'occupied':'';html+=`<span class="seat ${occupied}" onclick="selectSeat(${index},${seatIndex})">${seatIndex+1}</span>`;}html+="<br>";}
html+=`<button class="action" onclick="bookTrip(${index})">Book Trip</button></div>`;});
document.getElementById("app").innerHTML=html;
}
function busDashboard(){
let html=`<h2>Bus Operator Dashboard</h2>
<div class="card">
<input id="route" placeholder="Route">
<input id="price" placeholder="Price">
<button class="action" onclick="addTrip()">Add Trip</button>
</div>`;
document.getElementById("app").innerHTML=html;
}
function addTrip(){let route=document.getElementById("route").value;let price=document.getElementById("price").value;let trips=JSON.parse(localStorage.trips);trips.push({route:route,price:price,seats:[]});localStorage.trips=JSON.stringify(trips);alert("Trip added");}
let selectedSeat=null;let selectedTrip=null;
function selectSeat(tripIndex,seatIndex){let trips=JSON.parse(localStorage.trips);if(trips[tripIndex].seats && trips[tripIndex].seats.includes(seatIndex)){alert("Seat occupied");return;}selectedSeat=seatIndex;selectedTrip=tripIndex;alert("Seat selected: "+(seatIndex+1));}
function bookTrip(index){if(selectedSeat===null){alert("Select a seat first");return;}let trips=JSON.parse(localStorage.trips);trips[index].seats=trips[index].seats||[];trips[index].seats.push(selectedSeat);localStorage.trips=JSON.stringify(trips);let orders=JSON.parse(localStorage.orders);orders.push({type:"ticket",route:trips[index].route,seat:selectedSeat+1,status:"booked"});localStorage.orders=JSON.stringify(orders);alert("Ticket booked! Seat "+(selectedSeat+1));selectedSeat=null;selectedTrip=null;showBus();}

/* ------------------ SHIPPING ------------------ */
function showShipping(){document.getElementById("app").innerHTML=`
<h2>Create Shipment</h2>
<div class="card">
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<button class="action" onclick="createShipment()">Create</button>
</div>
`;}
function createShipment(){
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;
let shipments=JSON.parse(localStorage.shipments);
let tracking="NC-"+Math.floor(Math.random()*10000);
shipments.push({tracking:tracking,from:from,to:to,status:"Created"});
localStorage.shipments=JSON.stringify(shipments);
alert("Shipment created! Tracking: "+tracking);
}

/* ------------------ RIDER ------------------ */
function riderDashboard(){
let shipments=JSON.parse(localStorage.shipments);let html="<h2>Rider Deliveries</h2>";
shipments.forEach((s,i)=>{html+=`<div class="card">Tracking: ${s.tracking}<br>${s.from} → ${s.to}<br>Status: ${s.status}<br>
<button onclick="updateShipment(${i})">Deliver Step</button></div>`;});
document.getElementById("app").innerHTML=html;
}
function updateShipment(i){
let shipments=JSON.parse(localStorage.shipments);
let statusOrder=["Created","Picked Up","In Transit","Arrived","Out for Delivery","Delivered"];
let currentIndex=statusOrder.indexOf(shipments[i].status);
if(currentIndex<statusOrder.length-1) shipments[i].status=statusOrder[currentIndex+1];
localStorage.shipments=JSON.stringify(shipments);
alert("Shipment status updated to "+shipments[i].status);
riderDashboard();
}

/* ------------------ ADMIN ------------------ */
function adminDashboard(){
let users=JSON.parse(localStorage.users);
let orders=JSON.parse(localStorage.orders);
let shipments=JSON.parse(localStorage.shipments);
let trips=JSON.parse(localStorage.trips);
let html=`<h2>Admin Analytics</h2>
<div class="card">Users: ${users.length}</div>
<div class="card">Orders: ${orders.length}</div>
<div class="card">Shipments: ${shipments.length}</div>
<div class="card">Bus Trips: ${trips.length}</div>`;
document.getElementById("app").innerHTML=html;
}

/* ------------------ LOGISTICS MAP ------------------ */
function showLogisticsMap(){
document.getElementById("app").innerHTML=`<h2>Logistics Map (Juba → Kampala)</h2>
<canvas id="mapCanvas" width="800" height="400"></canvas>`;
let canvas=document.getElementById("mapCanvas");let ctx=canvas.getContext("2d");
let shipments=JSON.parse(localStorage.shipments);
let trips=JSON.parse(localStorage.trips);
let riders=JSON.parse(localStorage.users).filter(u=>u.role=="rider");
let cities={Juba:{x:100,y:200},Kampala:{x:700,y:200}};
function drawMap(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0A4DA3"; ctx.beginPath(); ctx.arc(cities.Juba.x,cities.Juba.y,15,0,2*Math.PI); ctx.fill();
ctx.fillText("Juba",cities.Juba.x-15,cities.Juba.y-20);
ctx.beginPath(); ctx.arc(cities.Kampala.x,cities.Kampala.y,15,0,2*Math.PI); ctx.fill();
ctx.fillText("Kampala",cities.Kampala.x-20,cities.Kampala.y-20);
shipments.forEach(s=>{if(!s.pos) s.pos=0;let px=cities.Juba.x+(cities.Kampala.x-cities.Juba.x)*(["Created","Picked Up","In Transit","Arrived","Out for Delivery","Delivered"].indexOf(s.status)/5); ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(px,cities.Juba.y,10,0,2*Math.PI); ctx.fill(); ctx.fillText(s.tracking+" "+s.status,px-30,cities.Juba.y-15);});
trips.forEach(t=>{if(!t.pos) t.pos=0;let px=cities.Juba.x+(cities.Kampala.x-cities.Juba.x)*(t.seats?t.seats.length/5:0); ctx.fillStyle="green"; ctx.beginPath(); ctx.arc(px,cities.Juba.y-50,10,0,2*Math.PI); ctx.fill(); ctx.fillText("Bus: "+t.route,px-30,cities.Juba.y-65);});
riders.forEach(r=>{if(!r.pos) r.pos=0;let px=cities.Juba.x+(cities.Kampala.x-cities.Juba.x)*(r.pos/5); ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(px,cities.Juba.y+50,10,0,2*Math.PI); ctx.fill(); ctx.fillText(r.name,px-20,cities.Juba.y+35);});
}
drawMap();
setInterval(()=>{drawMap();},1000);
}

/* ------------------ START ------------------ */
if(localStorage.session){loadDashboard();}else{renderLogin();}
</script>
</body>
</html>
