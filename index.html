<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NileCart Super Prototype v7</title>
<style>
body{font-family:Arial;margin:0;background:#f2f4f7;}
header{background:#0A4DA3;color:white;padding:15px;font-size:20px;}
nav{background:#00AEEF;padding:10px;}
nav button{margin:5px;padding:8px 12px;border:none;background:white;cursor:pointer;}
.container{padding:20px;}
.card{background:white;padding:15px;margin-bottom:10px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
input,select{padding:8px;margin:5px;width:200px;}
button.action{background:#F9A825;border:none;padding:8px 12px;cursor:pointer;}
canvas{border:1px solid #333;background:#d0f4ff;margin-top:10px;}
.notification{position:fixed;top:10px;right:10px;background:#F9A825;color:#000;padding:10px;border-radius:5px;box-shadow:0 2px 5px rgba(0,0,0,0.3);}
</style>
</head>
<body>
<header>NileCart Super Prototype v7</header>
<nav id="nav"></nav>
<div class="container" id="app"></div>

<script>
/* ---------------- INIT LOCALSTORAGE ---------------- */
function initDB(){
  if(!localStorage.users){
    let users=[
      {id:1,name:"Admin",email:"admin@nilecart.com",password:"1234",role:"admin"},
      {id:2,name:"Vendor",email:"vendor@nilecart.com",password:"1234",role:"vendor"},
      {id:3,name:"Restaurant",email:"food@nilecart.com",password:"1234",role:"restaurant"},
      {id:4,name:"Bus Operator",email:"bus@nilecart.com",password:"1234",role:"bus"},
      {id:5,name:"Rider",email:"rider@nilecart.com",password:"1234",role:"rider"},
      {id:6,name:"Customer",email:"customer@nilecart.com",password:"1234",role:"customer"}
    ];
    localStorage.users=JSON.stringify(users);
  }
  if(!localStorage.products) localStorage.products="[]";
  if(!localStorage.menu) localStorage.menu="[]";
  if(!localStorage.trips) localStorage.trips="[]";
  if(!localStorage.orders) localStorage.orders="[]";
  if(!localStorage.shipments) localStorage.shipments="[]";
  if(!localStorage.notifications) localStorage.notifications="[]";
}
initDB();

/* ---------------- AUTH ---------------- */
function login(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;
  let users=JSON.parse(localStorage.users);
  let user=users.find(u=>u.email==email && u.password==pass);
  if(!user){alert("Login failed");return;}
  localStorage.session=JSON.stringify(user);
  renderNav(); loadDashboard();
}
function logout(){localStorage.removeItem("session");renderLogin();}

/* ---------------- NAV ---------------- */
function renderNav(){
  let user=JSON.parse(localStorage.session);
  let nav=document.getElementById("nav");
  nav.innerHTML="";
  nav.innerHTML+=`<button onclick="loadDashboard()">Home</button>`;
  nav.innerHTML+=`<button onclick="showAnalytics()">Analytics</button>`;
  nav.innerHTML+=`<button onclick="showLogisticsMap()">Logistics Map</button>`;
  nav.innerHTML+=`<button onclick="showNotifications()">Notifications</button>`;
  nav.innerHTML+=`<button onclick="createDummyData()">Generate Dummy Data</button>`;
  nav.innerHTML+=`<button onclick="logout()">Logout</button>`;
}

/* ---------------- LOGIN ---------------- */
function renderLogin(){
document.getElementById("nav").innerHTML="";
document.getElementById("app").innerHTML=`
<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button class="action" onclick="login()">Login</button>
<p>Demo Accounts:</p>
admin@nilecart.com / 1234<br>
vendor@nilecart.com / 1234<br>
food@nilecart.com / 1234<br>
bus@nilecart.com / 1234<br>
rider@nilecart.com / 1234<br>
customer@nilecart.com / 1234
</div>`;
}

/* ---------------- DASHBOARD ---------------- */
function loadDashboard(){
  renderNav();
  let user=JSON.parse(localStorage.session);
  document.getElementById("app").innerHTML=`<div class="card"><h2>Welcome ${user.name}</h2>Role: ${user.role}</div>`;
}

/* ---------------- NOTIFICATIONS ---------------- */
function addNotification(message){
  let notifications=JSON.parse(localStorage.notifications);
  let user=JSON.parse(localStorage.session);
  notifications.push({user:user.email,message:message,time:new Date().toLocaleTimeString()});
  localStorage.notifications=JSON.stringify(notifications);
  showPopupNotification(message);
}
function showPopupNotification(message){
  let div=document.createElement("div");
  div.className="notification";
  div.innerText=message;
  document.body.appendChild(div);
  setTimeout(()=>{div.remove();},4000);
}
function showNotifications(){
  let notifications=JSON.parse(localStorage.notifications);
  let user=JSON.parse(localStorage.session);
  let html="<h2>Notifications</h2>";
  notifications.filter(n=>n.user==user.email).forEach(n=>{
    html+=`<div class="card">${n.time}: ${n.message}</div>`;
  });
  document.getElementById("app").innerHTML=html;
}

/* ---------------- LOGISTICS MAP ---------------- */
function showLogisticsMap(){
document.getElementById("app").innerHTML=`<h2>Interactive Logistics Map</h2>
<canvas id="mapCanvas" width="800" height="400"></canvas>
<p>Click dots to update status.</p>`;
let canvas=document.getElementById("mapCanvas");let ctx=canvas.getContext("2d");
let shipments=JSON.parse(localStorage.shipments);
let trips=JSON.parse(localStorage.trips);
let riders=JSON.parse(localStorage.users).filter(u=>u.role=="rider");
let cities={Juba:{x:100,y:200},Kampala:{x:700,y:200}};

function drawMap(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0A4DA3"; ctx.beginPath(); ctx.arc(cities.Juba.x,cities.Juba.y,15,0,2*Math.PI); ctx.fill();
  ctx.fillText("Juba",cities.Juba.x-15,cities.Juba.y-20);
  ctx.beginPath(); ctx.arc(cities.Kampala.x,cities.Kampala.y,15,0,2*Math.PI); ctx.fill();
  ctx.fillText("Kampala",cities.Kampala.x-20,cities.Kampala.y-20);
  shipments.forEach((s,i)=>{
    if(!s.pos) s.pos=0;
    let px=cities.Juba.x+(cities.Kampala.x-cities.Juba.x)*(["Created","Picked Up","In Transit","Arrived","Out for Delivery","Delivered"].indexOf(s.status)/5);
    ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(px,cities.Juba.y,10,0,2*Math.PI); ctx.fill();
    ctx.fillText(s.tracking+" "+s.status,px-30,cities.Juba.y-15);
    s.x=px; s.y=cities.Juba.y; s.index=i; s.type="shipment";
  });
  trips.forEach((t,i)=>{
    if(!t.pos) t.pos=0;
    let px=cities.Juba.x+(cities.Kampala.x-cities.Juba.x)*(t.seats?t.seats.length/5:0);
    ctx.fillStyle="green"; ctx.beginPath(); ctx.arc(px,cities.Juba.y-50,10,0,2*Math.PI); ctx.fill();
    ctx.fillText("Bus: "+t.route,px-30,cities.Juba.y-65);
    t.x=px; t.y=cities.Juba.y-50; t.index=i; t.type="bus";
  });
  riders.forEach((r,i)=>{
    if(!r.pos) r.pos=0;
    let px=cities.Juba.x+(cities.Kampala.x-cities.Juba.x)*(r.pos/5);
    ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(px,cities.Juba.y+50,10,0,2*Math.PI); ctx.fill();
    ctx.fillText(r.name,px-20,cities.Juba.y+35);
    r.x=px; r.y=cities.Juba.y+50; r.index=i; r.type="rider";
  });
}
drawMap();

canvas.addEventListener("click",(e)=>{
  let rect=canvas.getBoundingClientRect();
  let mx=e.clientX-rect.left;
  let my=e.clientY-rect.top;
  [...shipments,...trips,...riders].forEach(item=>{
    let dx=mx-item.x; let dy=my-item.y;
    if(Math.sqrt(dx*dx+dy*dy)<10){
      if(item.type=="shipment"){
        let statuses=["Created","Picked Up","In Transit","Arrived","Out for Delivery","Delivered"];
        let nextIndex=(statuses.indexOf(shipments[item.index].status)+1)%statuses.length;
        shipments[item.index].status=statuses[nextIndex];
        localStorage.shipments=JSON.stringify(shipments);
        addNotification(`Shipment ${shipments[item.index].tracking} updated to ${shipments[item.index].status}`);
      }
      if(item.type=="bus"){
        addNotification(`Bus ${trips[item.index].route} clicked`);
      }
      if(item.type=="rider"){
        addNotification(`Rider ${riders[item.index].name} clicked`);
      }
    }
  });
  drawMap();
});

setInterval(drawMap,1000);

/* ---------------- ANALYTICS ---------------- */
function showAnalytics(){
let orders=JSON.parse(localStorage.orders);
let shipments=JSON.parse(localStorage.shipments);
let trips=JSON.parse(localStorage.trips);

document.getElementById("app").innerHTML=`
<h2>Analytics Dashboard</h2>
<div class="card"><h3>Orders by Type</h3><canvas id="chartOrders" width="400" height="200"></canvas></div>
<div class="card"><h3>Shipments by Status</h3><canvas id="chartShipments" width="400" height="200"></canvas></div>
<div class="card"><h3>Bus Trips Status</h3><canvas id="chartTrips" width="400" height="200"></canvas></div>
`);

/* Chart helper */
function drawBarChart(canvasId,data,labels,color){
  let c=document.getElementById(canvasId);
  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);
  let max=Math.max(...data,1);
  let barWidth=c.width/data.length-10;
  data.forEach((v,i)=>{
    let h=(v/max)*(c.height-20);
    ctx.fillStyle=color;
    ctx.fillRect(i*(barWidth+10)+10,c.height-h-10,barWidth,h);
    ctx.fillStyle="#000";
    ctx.fillText(labels[i]+"("+v+")",i*(barWidth+10)+10,c.height-10);
  });
}

/* Orders by type */
let types=["product","food","ticket"];
let ordersData=types.map(t=>orders.filter(o=>o.type==t).length);
drawBarChart("chartOrders",ordersData,types,"#0A4DA3");

/* Shipments by status */
let statuses=["Created","Picked Up","In Transit","Arrived","Out for Delivery","Delivered"];
let shipmentData=statuses.map(s=>shipments.filter(sh=>sh.status==s).length);
drawBarChart("chartShipments",shipmentData,statuses,"#F9A825");

/* Trips by occupancy */
let tripData=trips.map(t=>t.seats?t.seats.length:0);
let tripLabels=trips.map(t=>t.route);
drawBarChart("chartTrips",tripData,tripLabels,"#00AEEF");
}

/* ---------------- DUMMY DATA CREATOR ---------------- */
function createDummyData(){
  // Orders
  let orders=JSON.parse(localStorage.orders);
  orders.push({id:Date.now(),type:"product"}); 
  orders.push({id:Date.now()+1,type:"food"}); 
  orders.push({id:Date.now()+2,type:"ticket"});
  localStorage.orders=JSON.stringify(orders);

  // Shipments
  let shipments=JSON.parse(localStorage.shipments);
  shipments.push({tracking:"SHP"+Math.floor(Math.random()*1000),status:"Created"});
  shipments.push({tracking:"SHP"+Math.floor(Math.random()*1000),status:"Picked Up"});
  localStorage.shipments=JSON.stringify(shipments);

  // Trips
  let trips=JSON.parse(localStorage.trips);
  trips.push({route:"Juba→Kampala",seats:[1,2,3]});
  trips.push({route:"Juba→Kampala",seats:[1,2]});
  localStorage.trips=JSON.stringify(trips);

  addNotification("Dummy data added!");
  loadDashboard();
}

/* ---------------- START ---------------- */
if(localStorage.session){loadDashboard();}else{renderLogin();}
</script>
</body>
</html>
