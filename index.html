<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NileCart Super Platform v11</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#0A4DA3;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

nav{
background:#00AEEF;
padding:10px;
text-align:center;
}

nav button{
margin:5px;
padding:8px 12px;
border:none;
background:white;
color:#00AEEF;
border-radius:6px;
cursor:pointer;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

input,select{
padding:6px;
margin:4px;
}

button.action{
background:#F9A825;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

canvas{
border:1px solid #ddd;
background:#e6f7ff;
}

</style>

</head>

<body>

<header>NileCart Super Platform v11</header>

<nav id="nav"></nav>

<div class="container" id="app"></div>

<script>

/* ---------------- DATABASE INIT ---------------- */

function initDB(){

if(!localStorage.users){

localStorage.users=JSON.stringify([
{id:1,name:"Admin",email:"admin@nilecart.com",password:"1234",role:"admin"},
{id:2,name:"Vendor",email:"vendor@nilecart.com",password:"1234",role:"vendor"},
{id:3,name:"Restaurant",email:"food@nilecart.com",password:"1234",role:"restaurant"},
{id:4,name:"Bus Operator",email:"bus@nilecart.com",password:"1234",role:"bus"},
{id:5,name:"Rider",email:"rider@nilecart.com",password:"1234",role:"rider"},
{id:6,name:"Customer",email:"customer@nilecart.com",password:"1234",role:"customer"}
])

}

if(!localStorage.products) localStorage.products="[]"
if(!localStorage.menu) localStorage.menu="[]"
if(!localStorage.orders) localStorage.orders="[]"
if(!localStorage.trips) localStorage.trips="[]"
if(!localStorage.shipments) localStorage.shipments="[]"
if(!localStorage.notifications) localStorage.notifications="[]"
if(!localStorage.cart) localStorage.cart="[]"

}

initDB()

/* ---------------- LOGIN ---------------- */

function renderLogin(){

document.getElementById("nav").innerHTML=""

document.getElementById("app").innerHTML=`

<div class="card">

<h2>Login</h2>

<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button class="action" onclick="login()">Login</button>

<p>
admin@nilecart.com / 1234<br>
vendor@nilecart.com / 1234<br>
food@nilecart.com / 1234<br>
bus@nilecart.com / 1234<br>
rider@nilecart.com / 1234<br>
customer@nilecart.com / 1234
</p>

</div>

`
}

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("pass").value

let users=JSON.parse(localStorage.users)

let u=users.find(x=>x.email==email && x.password==pass)

if(!u){alert("Login failed");return}

localStorage.session=JSON.stringify(u)

renderNav()
loadDashboard()

}

function logout(){
localStorage.removeItem("session")
renderLogin()
}

/* ---------------- NAV ---------------- */

function renderNav(){

let user=JSON.parse(localStorage.session)

let nav=document.getElementById("nav")

nav.innerHTML=""

nav.innerHTML+=`<button onclick="loadDashboard()">Home</button>`
nav.innerHTML+=`<button onclick="showLogistics()">Logistics Map</button>`
nav.innerHTML+=`<button onclick="showNotifications()">Notifications</button>`

if(user.role=="customer"){
nav.innerHTML+=`<button onclick="showMarketplace()">Marketplace</button>`
nav.innerHTML+=`<button onclick="createShipment()">Ship Parcel</button>`
}

if(user.role=="vendor"){
nav.innerHTML+=`<button onclick="vendorPanel()">Vendor</button>`
}

if(user.role=="restaurant"){
nav.innerHTML+=`<button onclick="restaurantPanel()">Restaurant</button>`
}

if(user.role=="bus"){
nav.innerHTML+=`<button onclick="busPanel()">Bus Trips</button>`
}

if(user.role=="rider"){
nav.innerHTML+=`<button onclick="riderPanel()">Deliveries</button>`
}

if(user.role=="admin"){
nav.innerHTML+=`<button onclick="adminPanel()">Admin</button>`
}

nav.innerHTML+=`<button onclick="logout()">Logout</button>`

}

/* ---------------- DASHBOARD ---------------- */

function loadDashboard(){

let user=JSON.parse(localStorage.session)

document.getElementById("app").innerHTML=`

<div class="card">

<h2>Welcome ${user.name}</h2>
Role: ${user.role}

</div>

`

}

/* ---------------- MARKETPLACE ---------------- */

function showMarketplace(){

let products=JSON.parse(localStorage.products)

let html=`<h2>Marketplace</h2><div class="grid">`

products.forEach((p,i)=>{

html+=`
<div class="card">
<h3>${p.name}</h3>
Price: $${p.price}<br>
<button onclick="addCart(${i})">Add</button>
</div>
`

})

html+=`</div><button onclick="viewCart()">Cart</button>`

document.getElementById("app").innerHTML=html

}

function addCart(i){

let cart=JSON.parse(localStorage.cart)
let products=JSON.parse(localStorage.products)

cart.push(products[i])

localStorage.cart=JSON.stringify(cart)

alert("Added")

}

function viewCart(){

let cart=JSON.parse(localStorage.cart)

let html="<h2>Cart</h2>"

cart.forEach(c=>{
html+=`<div class="card">${c.name} - $${c.price}</div>`
})

html+=`<button onclick="checkout()">Checkout</button>`

document.getElementById("app").innerHTML=html

}

function checkout(){

let cart=JSON.parse(localStorage.cart)
let orders=JSON.parse(localStorage.orders)
let user=JSON.parse(localStorage.session)

cart.forEach(p=>{

orders.push({
id:Date.now(),
type:"product",
product:p.name,
customer:user.email,
status:"Pending"
})

})

localStorage.orders=JSON.stringify(orders)
localStorage.cart="[]"

alert("Order placed")

}

/* ---------------- VENDOR ---------------- */

function vendorPanel(){

let html=`
<h2>Vendor Products</h2>

<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">

<button onclick="addProduct()">Add</button>

`

let products=JSON.parse(localStorage.products)

products.forEach(p=>{
html+=`<div class="card">${p.name} - $${p.price}</div>`
})

document.getElementById("app").innerHTML=html

}

function addProduct(){

let name=document.getElementById("pname").value
let price=document.getElementById("pprice").value

let products=JSON.parse(localStorage.products)

products.push({name,price})

localStorage.products=JSON.stringify(products)

vendorPanel()

}

/* ---------------- RESTAURANT ---------------- */

function restaurantPanel(){

let html=`
<h2>Restaurant Menu</h2>

<input id="fname" placeholder="Food">
<input id="fprice" placeholder="Price">

<button onclick="addFood()">Add</button>

`

let menu=JSON.parse(localStorage.menu)

menu.forEach(m=>{
html+=`<div class="card">${m.name} - $${m.price}</div>`
})

document.getElementById("app").innerHTML=html

}

function addFood(){

let name=document.getElementById("fname").value
let price=document.getElementById("fprice").value

let menu=JSON.parse(localStorage.menu)

menu.push({name,price})

localStorage.menu=JSON.stringify(menu)

restaurantPanel()

}

/* ---------------- BUS ---------------- */

function busPanel(){

let trips=JSON.parse(localStorage.trips)

let html="<h2>Bus Trips</h2>"

html+=`<button onclick="createTrip()">Create Trip</button>`

trips.forEach(t=>{
html+=`<div class="card">${t.route} | Seats: ${t.seats.length}</div>`
})

document.getElementById("app").innerHTML=html

}

function createTrip(){

let trips=JSON.parse(localStorage.trips)

trips.push({
route:"Juba → Kampala",
seats:[],
progress:0
})

localStorage.trips=JSON.stringify(trips)

busPanel()

}

/* ---------------- RIDER ---------------- */

function riderPanel(){

let shipments=JSON.parse(localStorage.shipments)

let html="<h2>Deliveries</h2>"

shipments.forEach((s,i)=>{

html+=`
<div class="card">

Tracking: ${s.tracking}<br>
Status: ${s.status}

<select onchange="updateShipment(${i},this.value)">
<option>Created</option>
<option>Picked Up</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

</div>
`

})

document.getElementById("app").innerHTML=html

}

function updateShipment(i,status){

let shipments=JSON.parse(localStorage.shipments)

shipments[i].status=status

localStorage.shipments=JSON.stringify(shipments)

alert("Updated")

}

/* ---------------- SHIPPING ---------------- */

function createShipment(){

let shipments=JSON.parse(localStorage.shipments)

shipments.push({
tracking:"NC"+Math.floor(Math.random()*100000),
status:"Created"
})

localStorage.shipments=JSON.stringify(shipments)

alert("Shipment created")

}

/* ---------------- ADMIN ---------------- */

function adminPanel(){

let users=JSON.parse(localStorage.users)
let orders=JSON.parse(localStorage.orders)
let shipments=JSON.parse(localStorage.shipments)
let trips=JSON.parse(localStorage.trips)

document.getElementById("app").innerHTML=`

<h2>Admin Dashboard</h2>

<div class="card">Users: ${users.length}</div>
<div class="card">Orders: ${orders.length}</div>
<div class="card">Shipments: ${shipments.length}</div>
<div class="card">Trips: ${trips.length}</div>

`

}

/* ---------------- MAP ---------------- */

function showLogistics(){

document.getElementById("app").innerHTML=`
<h2>Logistics Map</h2>
<canvas id="map" width="900" height="400"></canvas>
`

let canvas=document.getElementById("map")
let ctx=canvas.getContext("2d")

let shipments=JSON.parse(localStorage.shipments)

function draw(){

ctx.clearRect(0,0,900,400)

ctx.fillText("Juba",80,200)
ctx.fillText("Kampala",800,200)

ctx.beginPath()
ctx.moveTo(100,200)
ctx.lineTo(800,200)
ctx.stroke()

shipments.forEach((s,i)=>{

if(!s.progress) s.progress=0

s.progress+=0.002

let x=100+(700*s.progress)

ctx.beginPath()
ctx.arc(x,200,8,0,6.28)
ctx.fill()

})

}

setInterval(draw,30)

}

/* ---------------- NOTIFICATIONS ---------------- */

function showNotifications(){

let notes=JSON.parse(localStorage.notifications)

let html="<h2>Notifications</h2>"

notes.forEach(n=>{
html+=`<div class="card">${n}</div>`
})

document.getElementById("app").innerHTML=html

}

/* ---------------- START ---------------- */

if(localStorage.session){

renderNav()
loadDashboard()

}else{

renderLogin()

}

</script>

</body>
</html>
