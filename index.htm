<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NileCart v16 Hyper-Pro Max</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6fb;}
header{background:#0A4DA3;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;}
header b{font-size:1.3em;}
button{background:#F9A825;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;transition:all .3s;}
button:hover{transform:scale(1.05);}
input,select,textarea{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
.container{padding:15px;max-width:1200px;margin:auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);transition:all .3s;}
.card:hover{transform:scale(1.03);}
.tabs{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;}
.tab{background:#00AEEF;color:white;padding:6px 12px;border-radius:20px;cursor:pointer;}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:10px;border-top:1px solid #ddd;z-index:1000;}
@media(min-width:900px){.bottomnav{display:none;}}
#map{height:300px;background:#e8f1ff;border-radius:10px;position:relative;overflow:hidden;margin-bottom:15px;}
.dot{width:16px;height:16px;border-radius:50%;position:absolute;transition:all 2s;cursor:pointer;}
.timeline{border-left:3px solid #0A4DA3;padding-left:10px;margin-top:5px;}
.step{margin:8px 0;}
table{width:100%;border-collapse:collapse;margin-bottom:15px;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#0A4DA3;color:white;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:2000;}
.modal-content{background:white;padding:20px;border-radius:10px;max-width:400px;width:90%;}
</style>
</head>
<body>
<header>
<div><b>NileCart v16 Hyper-Pro Max</b></div>
<div id="user"></div>
</header>
<div class="container">
<div id="app"></div>
<div id="cart"></div>
<div id="notifications"></div>
</div>
<div class="bottomnav">
<div onclick="marketplace()">Home</div>
<div onclick="orders()">Orders</div>
<div onclick="tracking()">Track</div>
<div onclick="profile()">Profile</div>
</div>
<script>
/* =================== Seed LocalStorage =================== */
function seed(){
if(!localStorage.users) localStorage.users=JSON.stringify([
{email:"admin@nilecart.com",password:"1234",role:"admin"},
{email:"vendor@nilecart.com",password:"1234",role:"vendor"},
{email:"restaurant@nilecart.com",password:"1234",role:"restaurant"},
{email:"bus@nilecart.com",password:"1234",role:"bus"},
{email:"rider@nilecart.com",password:"1234",role:"rider"},
{email:"warehouse@nilecart.com",password:"1234",role:"warehouse"},
{email:"support@nilecart.com",password:"1234",role:"support"},
{email:"user@nilecart.com",password:"1234",role:"customer"}
]);
if(!localStorage.vendors) localStorage.vendors=JSON.stringify([{id:1,name:"Juba Electronics",rating:4.6},{id:2,name:"Nile Fashion",rating:4.2}]);
if(!localStorage.products) localStorage.products=JSON.stringify([{name:"Samsung Phone",price:300,vendor:1},{name:"Power Bank",price:20,vendor:1},{name:"T-Shirt",price:12,vendor:2}]);
if(!localStorage.restaurants) localStorage.restaurants=JSON.stringify([{id:1,name:"Nile Grill"},{id:2,name:"Juba Kitchen"}]);
if(!localStorage.menu) localStorage.menu=JSON.stringify([{name:"Burger",price:5,restaurant:1},{name:"Pizza",price:8,restaurant:1},{name:"Chicken Meal",price:7,restaurant:2}]);
if(!localStorage.trips) localStorage.trips=JSON.stringify([{route:"Juba → Kampala",price:45},{route:"Juba → Nimule",price:12}]);
if(!localStorage.orders) localStorage.orders="[]";
if(!localStorage.shipments) localStorage.shipments="[]";
if(!localStorage.cart) localStorage.cart="[]";
if(!localStorage.notifications) localStorage.notifications="[]";
if(!localStorage.drivers) localStorage.drivers="[]";
if(!localStorage.vehicles) localStorage.vehicles=JSON.stringify([
{id:"BUS-001",type:"bus",route:["Juba","Nimule","Gulu","Kampala"],pos:0,color:"blue"},
{id:"TRUCK-01",type:"truck",route:["Juba","Nimule","Gulu","Kampala"],pos:0,color:"green"},
{id:"RIDER-01",type:"rider",route:["Juba","Jebel","Gudele","Kampala"],pos:0,color:"orange"}
]);
if(!localStorage.currency) localStorage.currency="USD";
}
seed();

/* =================== Login =================== */
function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;
let users=JSON.parse(localStorage.users);
let u=users.find(x=>x.email==email && x.password==pass);
if(!u) return alert("Login failed");
localStorage.session=JSON.stringify(u);
location.reload();
}
function logout(){localStorage.removeItem("session"); location.reload()}

/* =================== Notifications =================== */
function notify(text){let n=JSON.parse(localStorage.notifications); n.push(text); localStorage.notifications=JSON.stringify(n); drawNotifications();}
function drawNotifications(){let n=JSON.parse(localStorage.notifications); let html="<h3>Notifications</h3>"; n.slice(-5).reverse().forEach(msg=>{html+="<div class='card'>"+msg+"</div>"}); document.getElementById("notifications").innerHTML=html;}

/* =================== Cart =================== */
function addCart(name,price){let c=JSON.parse(localStorage.cart); c.push({name,price}); localStorage.cart=JSON.stringify(c); drawCart();}
function drawCart(){let c=JSON.parse(localStorage.cart); let html="<b>Cart</b><br>"; let total=0; c.forEach(i=>{html+=i.name+" $"+i.price+"<br>"; total+=i.price}); html+="<br>Total $"+total+"<br><button onclick='checkout()'>Checkout</button>"; document.getElementById("cart").innerHTML=html;}
function checkout(){let c=JSON.parse(localStorage.cart); let o=JSON.parse(localStorage.orders); c.forEach(i=>o.push({item:i.name,status:"New"})); localStorage.orders=JSON.stringify(o); localStorage.cart="[]"; notify("New order placed"); drawCart(); alert("Order placed successfully!")}

/* =================== Marketplace =================== */
function marketplace(){
let html = `<h2>Marketplace</h2><div class="tabs">
<div class="tab" onclick="vendorsPage()">Vendors</div>
<div class="tab" onclick="restaurantsPage()">Restaurants</div>
<div class="tab" onclick="busPage()">Bus Tickets</div>
<div class="tab" onclick="shippingPage()">Shipping</div>
</div>
<div id="market"></div>`;
app.innerHTML=html; vendorsPage();
}

/* =================== Vendor Dashboard =================== */
function vendorDashboard(){
let products=JSON.parse(localStorage.products);
let html="<h2>Vendor Dashboard</h2>";
html+="<h3>Products</h3><table><tr><th>Name</th><th>Price</th></tr>";
products.forEach(p=>{html+=`<tr><td>${p.name}</td><td>${p.price}</td></tr>`});
html+="</table>";
html+=`<h3>Add Product</h3><input id="newProductName" placeholder="Name"><input id="newProductPrice" placeholder="Price"><button onclick="addProduct()">Add</button>`;
app.innerHTML=html;
}
function addProduct(){let name=document.getElementById("newProductName").value; let price=parseFloat(document.getElementById("newProductPrice").value); let products=JSON.parse(localStorage.products); products.push({name,price,vendor:1}); localStorage.products=JSON.stringify(products); vendorDashboard(); notify("Product added");}

/* =================== Render App =================== */
function render(){
let s=JSON.parse(localStorage.session||"null");
if(!s){app.innerHTML=`<h2>Login</h2><input id="email" placeholder="email"><input id="password" type="password" placeholder="password"><button onclick="login()">Login</button>`; return;}
user.innerHTML=s.role+" <button onclick='logout()'>Logout</button>";
drawNotifications();
drawCart();
switch(s.role){
case "customer": marketplace(); break;
case "vendor": vendorDashboard(); break;
case "admin": adminDashboard(); break;
case "restaurant": restaurantDashboard(); break;
case "bus": busDashboard(); break;
case "rider": riderDashboard(); break;
case "warehouse": warehouseDashboard(); break;
case "support": supportDashboard(); break;
}
}

/* =================== Admin Dashboard =================== */
function adminDashboard(){
let orders=JSON.parse(localStorage.orders);
let shipments=JSON.parse(localStorage.shipments);
app.innerHTML=`<h2>Admin Dashboard</h2><canvas id="chart"></canvas><div id="map"></div>`;
renderMap();
let ctx=document.getElementById("chart");
new Chart(ctx,{type:"bar",data:{labels:["Orders","Shipments"],datasets:[{label:"Count",data:[orders.length,shipments.length],backgroundColor:["#0A4DA3","#F9A825"]}]},options:{responsive:true}});
}

/* =================== GPS Vehicles =================== */
function renderMap(){
let map=document.getElementById("map");
if(!map)return; map.innerHTML="";
let vehicles=JSON.parse(localStorage.vehicles);
vehicles.forEach(v=>{
let posPct=(v.pos/(v.route.length-1))*80+10;
let topPct=30+Math.random()*30;
let dot=document.createElement("div");
dot.className="dot"; dot.style.top=topPct+"%"; dot.style.left=posPct+"%"; dot.style.background=v.color; dot.title=v.type+" "+v.id;
map.appendChild(dot);
});
vehicles.forEach(v=>{if(v.pos<v.route.length-1)v.pos++;});
localStorage.vehicles=JSON.stringify(vehicles);
}
setInterval(renderMap,2000);

render();
</script>
</body>
</html>
